name: Deploy Cache API to VPS

on:
  push:
    branches:
      - main # Trigger on push to main branch
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_SERVICE_NAME: ${{ secrets.DEPLOY_SERVICE_NAME }}
      DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
      DEPLOY_REPO_SLUG: ${{ secrets.DEPLOY_REPO_SLUG }}
      DEPLOY_PREVIOUS_SERVICE_NAME: ${{ secrets.DEPLOY_PREVIOUS_SERVICE_NAME }}
      DEPLOY_PRIMARY_REPO_SLUG: ${{ secrets.DEPLOY_PRIMARY_REPO_SLUG }}
      DEPLOY_SOURCE_REPO_SLUG: ${{ github.repository }}
      DEPLOY_PRODUCTION_SERVICE_NAME: ${{ secrets.DEPLOY_PRODUCTION_SERVICE_NAME }}
      DEPLOY_PRODUCTION_PORT: ${{ secrets.DEPLOY_PRODUCTION_PORT }}
      DEPLOY_NGINX_SITE_NAME: ${{ secrets.DEPLOY_NGINX_SITE_NAME }}
      DEPLOY_PROTECTED_NGINX_SITE_NAME: ${{ secrets.DEPLOY_PROTECTED_NGINX_SITE_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deployment preflight (guard debug)
        shell: bash
        run: |
          set -e
          RAW_SERVICE_NAME="${DEPLOY_SERVICE_NAME:-cache-api}"
          if [ "${RAW_SERVICE_NAME}" = "cache-api-prod" ]; then
            SERVICE_NAME="cache-api"
          else
            SERVICE_NAME="${RAW_SERVICE_NAME}"
          fi

          PORT="${DEPLOY_PORT:-5000}"
          PRIMARY_REPO_SLUG="${DEPLOY_PRIMARY_REPO_SLUG:-joypciu/cache-api}"
          PRODUCTION_SERVICE_NAME="${DEPLOY_PRODUCTION_SERVICE_NAME:-cache-api}"
          PRODUCTION_PORT="${DEPLOY_PRODUCTION_PORT:-5000}"
          NGINX_SITE_NAME="${DEPLOY_NGINX_SITE_NAME:-${SERVICE_NAME}}"
          PROTECTED_NGINX_SITE_NAME="${DEPLOY_PROTECTED_NGINX_SITE_NAME:-cache-api}"
          SOURCE_REPO_SLUG="${DEPLOY_SOURCE_REPO_SLUG:-${{ github.repository }}}"

          echo "=== Deploy Preflight ==="
          echo "source_repo=${SOURCE_REPO_SLUG}"
          echo "primary_repo=${PRIMARY_REPO_SLUG}"
          echo "service_name=${SERVICE_NAME}"
          echo "port=${PORT}"
          echo "nginx_site=${NGINX_SITE_NAME}"

          if [ "${SOURCE_REPO_SLUG}" != "${PRIMARY_REPO_SLUG}" ]; then
            if [ "${SERVICE_NAME}" = "${PRODUCTION_SERVICE_NAME}" ]; then
              echo "❌ [GUARD:SERVICE_NAME_RESERVED] Non-primary repo cannot use protected service '${PRODUCTION_SERVICE_NAME}'."
              echo "Set unique DEPLOY_SERVICE_NAME and DEPLOY_DIR."
              exit 1
            fi

            if [ "${PORT}" = "${PRODUCTION_PORT}" ]; then
              echo "❌ [GUARD:PORT_RESERVED] Non-primary repo cannot use protected port '${PRODUCTION_PORT}'."
              echo "Set a unique DEPLOY_PORT."
              exit 1
            fi

            if [ "${NGINX_SITE_NAME}" = "${PROTECTED_NGINX_SITE_NAME}" ]; then
              echo "❌ [GUARD:NGINX_SITE_RESERVED] Non-primary repo cannot use protected nginx site '${PROTECTED_NGINX_SITE_NAME}'."
              echo "Set a unique DEPLOY_NGINX_SITE_NAME."
              exit 1
            fi
          fi

          echo "✅ Preflight passed"

      - name: Deploy to VPS (attempt 1)
        id: deploy_try_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 5m
          script: |
            set -e
            RAW_SERVICE_NAME="${DEPLOY_SERVICE_NAME:-cache-api}"
            if [ "${RAW_SERVICE_NAME}" = "cache-api-prod" ]; then
              SERVICE_NAME="cache-api"
            else
              SERVICE_NAME="${RAW_SERVICE_NAME}"
            fi
            SERVICE_DIR="${DEPLOY_DIR:-/home/ubuntu/services/${SERVICE_NAME}}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            PORT="${DEPLOY_PORT:-5000}"
            REPO_URL="${DEPLOY_REPO_URL:-https://github.com/joypciu/cache-api.git}"
            REPO_SLUG="${DEPLOY_REPO_SLUG:-joypciu/cache-api}"
            PRIMARY_REPO_SLUG="${DEPLOY_PRIMARY_REPO_SLUG:-joypciu/cache-api}"
            PRODUCTION_SERVICE_NAME="${DEPLOY_PRODUCTION_SERVICE_NAME:-cache-api}"
            PRODUCTION_PORT="${DEPLOY_PRODUCTION_PORT:-5000}"
            NGINX_SITE_NAME="${DEPLOY_NGINX_SITE_NAME:-${SERVICE_NAME}}"
            PROTECTED_NGINX_SITE_NAME="${DEPLOY_PROTECTED_NGINX_SITE_NAME:-cache-api}"
            SOURCE_REPO_SLUG="${DEPLOY_SOURCE_REPO_SLUG:-${{ github.repository }}}"
            PREVIOUS_SERVICE="${DEPLOY_PREVIOUS_SERVICE_NAME:-}"
            ALLOW_PRIMARY_SERVICE_NAME="false"

            if [ "${SERVICE_NAME}" = "${PRODUCTION_SERVICE_NAME}" ] && [ "${SOURCE_REPO_SLUG}" = "${PRIMARY_REPO_SLUG}" ]; then
              ALLOW_PRIMARY_SERVICE_NAME="true"
            fi

            if [ -z "${PREVIOUS_SERVICE}" ] && [ "${SERVICE_NAME}" = "cache-api" ]; then
              PREVIOUS_SERVICE="cache-api-prod"
            fi

            echo "Deploying service=${SERVICE_NAME} dir=${SERVICE_DIR} branch=${BRANCH} port=${PORT}"

            if [ ! -d "${SERVICE_DIR}" ]; then
              mkdir -p "${SERVICE_DIR}"
            fi
            cd "${SERVICE_DIR}"

            if [ ! -d ".git" ]; then
              git clone "${REPO_URL}" .
            fi

            export SERVICE_NAME="${SERVICE_NAME}"
            export SERVICE_DIR="${SERVICE_DIR}"
            export DEPLOY_BRANCH="${BRANCH}"
            export API_PORT="${PORT}"
            export REPO_URL="${REPO_URL}"
            export EXPECTED_REPO_SLUG="${REPO_SLUG}"
            export PREVIOUS_SERVICE_NAME="${PREVIOUS_SERVICE}"
            export SOURCE_REPO_SLUG="${SOURCE_REPO_SLUG}"
            export PRIMARY_REPO_SLUG="${PRIMARY_REPO_SLUG}"
            export ALLOW_PRIMARY_SERVICE_NAME="${ALLOW_PRIMARY_SERVICE_NAME}"
            export PRODUCTION_SERVICE_NAME="${PRODUCTION_SERVICE_NAME}"
            export PRODUCTION_PORT="${PRODUCTION_PORT}"
            export NGINX_SITE_NAME="${NGINX_SITE_NAME}"
            export PROTECTED_NGINX_SITE_NAME="${PROTECTED_NGINX_SITE_NAME}"
            export REQUIRE_UNIQUE_NAME="false"

            chmod +x deploy.sh
            ./deploy.sh

            echo "=== service status ==="
            sudo systemctl status "${SERVICE_NAME}" --no-pager || true
            echo "✅ deployment completed"

      - name: Wait before retry
        if: steps.deploy_try_1.outcome == 'failure'
        run: sleep 10

      - name: Deploy to VPS (attempt 2)
        id: deploy_try_2
        if: steps.deploy_try_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 5m
          script: |
            set -e
            RAW_SERVICE_NAME="${DEPLOY_SERVICE_NAME:-cache-api}"
            if [ "${RAW_SERVICE_NAME}" = "cache-api-prod" ]; then
              SERVICE_NAME="cache-api"
            else
              SERVICE_NAME="${RAW_SERVICE_NAME}"
            fi
            SERVICE_DIR="${DEPLOY_DIR:-/home/ubuntu/services/${SERVICE_NAME}}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            PORT="${DEPLOY_PORT:-5000}"
            REPO_URL="${DEPLOY_REPO_URL:-https://github.com/joypciu/cache-api.git}"
            REPO_SLUG="${DEPLOY_REPO_SLUG:-joypciu/cache-api}"
            PRIMARY_REPO_SLUG="${DEPLOY_PRIMARY_REPO_SLUG:-joypciu/cache-api}"
            PRODUCTION_SERVICE_NAME="${DEPLOY_PRODUCTION_SERVICE_NAME:-cache-api}"
            PRODUCTION_PORT="${DEPLOY_PRODUCTION_PORT:-5000}"
            NGINX_SITE_NAME="${DEPLOY_NGINX_SITE_NAME:-${SERVICE_NAME}}"
            PROTECTED_NGINX_SITE_NAME="${DEPLOY_PROTECTED_NGINX_SITE_NAME:-cache-api}"
            SOURCE_REPO_SLUG="${DEPLOY_SOURCE_REPO_SLUG:-${{ github.repository }}}"
            PREVIOUS_SERVICE="${DEPLOY_PREVIOUS_SERVICE_NAME:-}"
            ALLOW_PRIMARY_SERVICE_NAME="false"

            if [ "${SERVICE_NAME}" = "${PRODUCTION_SERVICE_NAME}" ] && [ "${SOURCE_REPO_SLUG}" = "${PRIMARY_REPO_SLUG}" ]; then
              ALLOW_PRIMARY_SERVICE_NAME="true"
            fi

            if [ -z "${PREVIOUS_SERVICE}" ] && [ "${SERVICE_NAME}" = "cache-api" ]; then
              PREVIOUS_SERVICE="cache-api-prod"
            fi

            echo "Deploying service=${SERVICE_NAME} dir=${SERVICE_DIR} branch=${BRANCH} port=${PORT}"

            if [ ! -d "${SERVICE_DIR}" ]; then
              mkdir -p "${SERVICE_DIR}"
            fi
            cd "${SERVICE_DIR}"

            if [ ! -d ".git" ]; then
              git clone "${REPO_URL}" .
            fi

            export SERVICE_NAME="${SERVICE_NAME}"
            export SERVICE_DIR="${SERVICE_DIR}"
            export DEPLOY_BRANCH="${BRANCH}"
            export API_PORT="${PORT}"
            export REPO_URL="${REPO_URL}"
            export EXPECTED_REPO_SLUG="${REPO_SLUG}"
            export PREVIOUS_SERVICE_NAME="${PREVIOUS_SERVICE}"
            export SOURCE_REPO_SLUG="${SOURCE_REPO_SLUG}"
            export PRIMARY_REPO_SLUG="${PRIMARY_REPO_SLUG}"
            export ALLOW_PRIMARY_SERVICE_NAME="${ALLOW_PRIMARY_SERVICE_NAME}"
            export PRODUCTION_SERVICE_NAME="${PRODUCTION_SERVICE_NAME}"
            export PRODUCTION_PORT="${PRODUCTION_PORT}"
            export NGINX_SITE_NAME="${NGINX_SITE_NAME}"
            export PROTECTED_NGINX_SITE_NAME="${PROTECTED_NGINX_SITE_NAME}"
            export REQUIRE_UNIQUE_NAME="false"

            chmod +x deploy.sh
            ./deploy.sh

            echo "=== service status ==="
            sudo systemctl status "${SERVICE_NAME}" --no-pager || true
            echo "✅ deployment completed"

      - name: Fail if deploy did not succeed
        if: steps.deploy_try_1.outcome == 'failure' && steps.deploy_try_2.outcome == 'failure'
        run: |
          echo "❌ Deployment failed after 2 SSH attempts (likely transient network/SSH reset or VPS-side SSH throttling)."
          exit 1

      - name: Smoke test configuration
        id: smoke_cfg
        if: steps.deploy_try_1.outcome == 'success' || steps.deploy_try_2.outcome == 'success'
        shell: bash
        env:
          SMOKE_API_TOKEN_PRIMARY: ${{ secrets.CACHE_API_TOKEN }}
          SMOKE_API_TOKEN_FALLBACK: ${{ secrets.API_TOKEN }}
          SMOKE_ADMIN_TOKEN_PRIMARY: ${{ secrets.CACHE_API_ADMIN_TOKEN }}
          SMOKE_ADMIN_TOKEN_FALLBACK_1: ${{ secrets.ADMIN_API_TOKEN }}
          SMOKE_ADMIN_TOKEN_FALLBACK_2: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -e
          SMOKE_API_TOKEN="${SMOKE_API_TOKEN_PRIMARY:-${SMOKE_API_TOKEN_FALLBACK:-}}"
          SMOKE_ADMIN_TOKEN="${SMOKE_ADMIN_TOKEN_PRIMARY:-${SMOKE_ADMIN_TOKEN_FALLBACK_1:-${SMOKE_ADMIN_TOKEN_FALLBACK_2:-}}}"

          if [ -z "${SMOKE_API_TOKEN}" ] || [ -z "${SMOKE_ADMIN_TOKEN}" ]; then
            echo "run_smoke=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Skipping smoke tests: set secrets CACHE_API_TOKEN (or API_TOKEN) and CACHE_API_ADMIN_TOKEN (or ADMIN_API_TOKEN/ADMIN_TOKEN)"
          else
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post-deploy production smoke test
        id: smoke_test
        if: steps.smoke_cfg.outputs.run_smoke == 'true'
        shell: bash
        env:
          SMOKE_API_TOKEN: ${{ secrets.CACHE_API_TOKEN || secrets.API_TOKEN }}
          SMOKE_ADMIN_TOKEN: ${{ secrets.CACHE_API_ADMIN_TOKEN || secrets.ADMIN_API_TOKEN || secrets.ADMIN_TOKEN }}
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install requests
          python testing.py --mode full --target prod --token "${SMOKE_API_TOKEN}" --admin-token "${SMOKE_ADMIN_TOKEN}"

      - name: Notify on smoke test failure
        if: failure() && steps.smoke_test.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_SENDER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.ADMIN_EMAIL }}
          from: Cache API CI <${{ secrets.GMAIL_SENDER }}>
          subject: "🚨 Smoke Test FAILED — cache-api (${{ github.ref_name }})"
          body: |
            The post-deploy smoke test for cache-api failed.

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered by : ${{ github.actor }}

            View the full run log:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Fix the issue and push again to trigger a new deployment.
