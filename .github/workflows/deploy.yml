name: Deploy Cache API to VPS

on:
  push:
    branches:
      - main # Trigger on push to main branch
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_SERVICE_NAME: ${{ secrets.DEPLOY_SERVICE_NAME }}
      DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
      DEPLOY_REPO_SLUG: ${{ secrets.DEPLOY_REPO_SLUG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 5m
          script: |
            set -e
            SERVICE_NAME="${DEPLOY_SERVICE_NAME:-cache-api-prod}"
            SERVICE_DIR="${DEPLOY_DIR:-/home/ubuntu/services/${SERVICE_NAME}}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            PORT="${DEPLOY_PORT:-5000}"
            REPO_URL="${DEPLOY_REPO_URL:-https://github.com/joypciu/cache-api.git}"
            REPO_SLUG="${DEPLOY_REPO_SLUG:-joypciu/cache-api}"

            echo "Deploying service=${SERVICE_NAME} dir=${SERVICE_DIR} branch=${BRANCH} port=${PORT}"

            if [ ! -d "${SERVICE_DIR}" ]; then
              mkdir -p "${SERVICE_DIR}"
            fi
            cd "${SERVICE_DIR}"

            if [ ! -d ".git" ]; then
              git clone "${REPO_URL}" .
            fi

            export SERVICE_NAME="${SERVICE_NAME}"
            export SERVICE_DIR="${SERVICE_DIR}"
            export DEPLOY_BRANCH="${BRANCH}"
            export API_PORT="${PORT}"
            export REPO_URL="${REPO_URL}"
            export EXPECTED_REPO_SLUG="${REPO_SLUG}"
            export REQUIRE_UNIQUE_NAME="true"

            chmod +x deploy.sh
            ./deploy.sh

            echo "=== service status ==="
            sudo systemctl status "${SERVICE_NAME}" --no-pager || true
            echo "✅ deployment completed"
